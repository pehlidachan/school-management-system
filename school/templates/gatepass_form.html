{% extends 'dashboard_base.html' %}
{% block 'title' %}New Gate Pass{% endblock %}
{% block 'content' %}
<div class="hub-toolbar"><div><h1 class="hub-page-title">New Gate Pass</h1><p class="text-muted mb-0">Student, staff member, worker or other visitor gate pass.</p></div><a href="{% url 'gatepass_dashboard' %}" class="btn btn-outline-dark rounded-pill">Back</a></div>
<div class="hub-card p-4"><form method="POST" class="row g-3">{% csrf_token %}<div class="col-md-4"><label class="form-label fw-bold">Person Type</label><select name="person_type" class="form-select rounded-pill"><option value="student">Student</option><option value="staff">Staff Member</option><option value="worker">Maintenance Worker</option><option value="other">Other Visitor</option></select></div><div class="col-md-4"><label class="form-label fw-bold">Student</label><select name="student" class="form-select rounded-pill"><option value="">Select student</option>{% for item in students %}<option value="{{ item.id }}">{{ item.name }} - {{ item.grade }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label fw-bold">Staff</label><select name="staff" class="form-select rounded-pill"><option value="">Select staff</option>{% for item in staff_members %}<option value="{{ item.id }}">{{ item.name }} - {{ item.role }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label fw-bold">Manual Name</label><input name="person_name" class="form-control rounded-pill" placeholder="Worker/other visitor name"></div><div class="col-md-4"><label class="form-label fw-bold">Phone</label><input name="phone" class="form-control rounded-pill"></div><div class="col-md-4"><label class="form-label fw-bold">Organization</label><input name="organization" class="form-control rounded-pill" placeholder="Company / department"></div><div class="col-md-6"><label class="form-label fw-bold">Destination</label><input name="destination" class="form-control rounded-pill" placeholder="Where going"></div><div class="col-md-6"><label class="form-label fw-bold">Expected Return</label><input type="datetime-local" name="expected_return_time" class="form-control rounded-pill"></div><div class="col-md-12"><label class="form-label fw-bold">Reason</label><textarea name="reason" rows="4" class="form-control rounded-4" required></textarea></div><div class="col-md-12"><label class="form-label fw-bold">Luggage Detail</label><textarea name="luggage_detail" rows="3" class="form-control rounded-4" placeholder="Bag, tools, laptop, equipment etc."></textarea></div><div class="col-12"><button class="btn btn-success rounded-pill px-4" type="submit">Create & Print Gate Pass</button></div></form></div>
{% endblock %}
