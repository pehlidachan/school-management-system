{% extends 'dashboard_base.html' %}
{% load static %}
{% block 'title' %}Add School Expense{% endblock %}
{% block 'content' %}
<div class="hub-toolbar">
    <div><h1 class="hub-page-title">Add School Expense</h1><p class="text-muted mb-0">Record operational expenses.</p></div>
    <a href="{% url 'school_expenses' %}" class="btn btn-outline-dark rounded-pill">Back</a>
</div>

<form method="POST" class="hub-card p-4">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-md-4"><label class="form-label">Category</label><input name="category_name" class="form-control rounded-pill" placeholder="Maintenance / Library / Salary" list="category-list" value="General"><datalist id="category-list">{% for category in categories %}<option value="{{ category.name }}">{% endfor %}</datalist></div>
        <div class="col-md-4"><label class="form-label">Expense Title</label><input name="title" class="form-control rounded-pill" required></div>
        <div class="col-md-4"><label class="form-label">Quantity</label><input name="quantity" class="form-control rounded-pill" placeholder="10 pcs / 1 service"></div>
        <div class="col-md-3"><label class="form-label">Amount</label><input type="number" step="0.01" name="amount" class="form-control rounded-pill" required></div>
        <div class="col-md-3"><label class="form-label">Payment Date</label><input type="date" name="payment_date" class="form-control rounded-pill" value="{{ today|date:'Y-m-d' }}"></div>
        <div class="col-md-3"><label class="form-label">Paid To</label><input name="paid_to" class="form-control rounded-pill"></div>
        <div class="col-md-3"><label class="form-label">Payment Method</label><input name="payment_method" class="form-control rounded-pill" value="Cash"></div>
        <div class="col-12"><label class="form-label">Note</label><textarea name="note" class="form-control rounded-4" rows="3"></textarea></div>
        <div class="col-12 text-end"><button class="btn btn-dark rounded-pill px-4" type="submit">Save Expense</button></div>
    </div>
</form>
{% endblock %}
