<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet"><title>Online Admission Form</title><style>body{margin:0;background:#f3f4f7;font-family:'IBM Plex Sans',Arial,sans-serif;color:#111}.wrap{max-width:820px;margin:35px auto;background:#fff;border-radius:24px;padding:28px;box-shadow:0 18px 50px rgba(43,0,45,.12)}h1{margin:0;color:#2b002d}.sub{color:#777;margin:6px 0 22px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}label{font-weight:700;color:#2b002d}input,textarea,select{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:16px;padding:12px;margin-top:6px;font:inherit}button{border:0;border-radius:999px;background:#2b002d;color:white;padding:12px 22px;font-weight:700;cursor:pointer}.links{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}.links a{color:#2b002d;font-weight:700;text-decoration:none}@media(max-width:700px){.grid{grid-template-columns:1fr}.wrap{margin:15px}}</style></head><body><main class="wrap"><h1>Online Admission Application</h1><p class="sub">Separate admission form for new student registration request.</p><form method="POST" class="grid">{% csrf_token %}<div><label>Student Name</label><input name="student_name" required></div><div><label>Desired Class</label><input name="desired_class" placeholder="Grade 6" required></div><div><label>Date of Birth</label><input type="date" name="dob"></div><div><label>Gender</label><select name="gender"><option value="">Select</option><option>Male</option><option>Female</option></select></div><div><label>Father Name</label><input name="father_name" required></div><div><label>Guardian Phone</label><input name="guardian_phone" required></div><div><label>Guardian Email</label><input type="email" name="guardian_email"></div><div><label>Previous School</label><input name="previous_school"></div><div class="full"><label>Address</label><textarea name="address" rows="3" required></textarea></div><div class="full"><label>Additional Note</label><textarea name="note" rows="4"></textarea></div><div class="full"><button type="submit">Submit Admission Application</button></div></form><div class="links"><a href="/complaints/parent/">Parent Complaint</a><a href="/jobs/apply/">Job Apply Form</a><a href="/">Home</a></div></main></body></html>
