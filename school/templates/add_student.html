{% extends 'dashboard_base.html' %}
{% load static %}
{% block 'title' %}Add Student{% endblock %}
{% block 'style' %}
<style>
.modern-form p { margin-bottom: 16px; }
.modern-form label { font-weight: 700; margin-bottom: 6px; color: #2b002d; display: block; }
.modern-form input, .modern-form select, .modern-form textarea { width: 100%; border: 1px solid #e5e7eb; border-radius: 18px; padding: 11px 15px; background: #fff; outline: none; }
.modern-form input:focus, .modern-form select:focus, .modern-form textarea:focus { border-color: #2b002d; box-shadow: 0 0 0 4px rgba(43,0,45,.08); }
.modern-form .helptext { display:block; color:#6b7280; font-size:12px; margin-top:4px; }
.modern-form ul.errorlist { color:#dc3545; font-weight:700; margin:0 0 6px 0; padding-left:18px; }
</style>
{% endblock %}
{% block 'content' %}
<div class="hub-toolbar">
    <div>
        <h1 class="hub-page-title">Add Student</h1>
        <p class="text-muted mb-0">Create a new student admission/profile record.</p>
    </div>
    <a href="{% url 'display_students' %}" class="btn btn-outline-dark rounded-pill">Back to Students</a>
</div>

<div class="hub-card p-4">
    <form class="modern-form" action="{% url 'add_student' %}" method="POST">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-12">
                {{ form.as_p }}
            </div>
            <div class="col-12 d-flex gap-2 flex-wrap">
                <button class="btn btn-success rounded-pill px-4 fw-bold" type="submit">Save Student</button>
                <a href="{% url 'display_students' %}" class="btn btn-outline-dark rounded-pill px-4">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
