{% extends 'dashboard_base.html' %}
{% load static %}
{% block 'title' %}Add Notice{% endblock %}
{% block 'content' %}
<div class="hub-toolbar">
    <div>
        <h1 class="hub-page-title">Add Notice</h1>
        <p class="text-muted mb-0">Publish a school announcement.</p>
    </div>
    <a href="{% url 'notice_board' %}" class="btn btn-outline-dark rounded-pill">Back</a>
</div>

<form method="POST" class="hub-card p-4">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-12">
            <label class="form-label">Title</label>
            <input name="title" class="form-control rounded-pill" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Audience</label>
            <select name="audience" class="form-select rounded-pill">
                {% for value, label in audience_choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-select rounded-pill">
                {% for value, label in priority_choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Publish Date</label>
            <input type="date" name="publish_date" value="{{ today|date:'Y-m-d' }}" class="form-control rounded-pill">
        </div>
        <div class="col-md-4">
            <label class="form-label">Expiry Date</label>
            <input type="date" name="expiry_date" class="form-control rounded-pill">
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <label class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="is_published" checked>
                <span class="form-check-label">Publish now</span>
            </label>
        </div>
        <div class="col-12">
            <label class="form-label">Notice Body</label>
            <textarea name="body" class="form-control rounded-4" rows="7" required></textarea>
        </div>
        <div class="col-12 text-end">
            <button class="btn btn-success rounded-pill px-4" type="submit">Publish Notice</button>
        </div>
    </div>
</form>
{% endblock %}
