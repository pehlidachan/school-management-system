{% extends 'dashboard_base.html' %}
{% block 'title' %}Add Account{% endblock %}
{% block 'content' %}
<div class="hub-toolbar"><div><h1 class="hub-page-title">Add Cash/Bank Account</h1><p class="text-muted mb-0">Create a cash or bank account.</p></div><a href="{% url 'ledger_dashboard' %}" class="btn btn-outline-dark rounded-pill">Back</a></div>
<div class="hub-card p-4"><form method="POST">{% csrf_token %}<div class="row g-3"><div class="col-md-5"><label class="form-label fw-bold">Name</label><input name="name" class="form-control" required></div><div class="col-md-3"><label class="form-label fw-bold">Type</label><select name="account_type" class="form-select"><option value="cash">Cash</option><option value="bank">Bank</option></select></div><div class="col-md-4"><label class="form-label fw-bold">Opening Balance</label><input name="opening_balance" type="number" step="0.01" value="0" class="form-control"></div><div class="col-12"><button class="btn btn-success rounded-pill px-4">Save Account</button></div></div></form></div>
{% endblock %}
