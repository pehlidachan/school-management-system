{% extends 'dashboard_base.html' %}
{% load static %}
{% block 'title' %}Bulk Fee Invoices{% endblock %}
{% block 'content' %}
<div class="hub-toolbar">
    <div>
        <h1 class="hub-page-title">Bulk Fee Invoice Generator</h1>
        <p class="text-muted mb-0">Create monthly fee invoices for all active students in a selected class.</p>
    </div>
    <a href="{% url 'fees_collection' %}" class="btn btn-outline-dark rounded-pill">Fees Collection</a>
</div>

<div class="hub-card p-4">
    <form method="POST" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6">
            <label class="form-label fw-bold">Class</label>
            <select name="grade" class="form-select rounded-pill" required>
                <option value="">Choose class</option>
                {% for grade in grades %}
                <option value="{{ grade.id }}">{{ grade }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Billing Month</label>
            <input type="text" name="billing_month" class="form-control rounded-pill" placeholder="July 2026" required>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Invoice Title</label>
            <input type="text" name="title" class="form-control rounded-pill" value="Monthly Fee" required>
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Due Date</label>
            <input type="date" name="due_date" class="form-control rounded-pill" value="{{ today|date:'Y-m-d' }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label fw-bold">Tuition Fee</label>
            <input type="number" step="0.01" min="0" name="tuition_fee" class="form-control rounded-pill" value="0">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-bold">Activities Fee</label>
            <input type="number" step="0.01" min="0" name="activities_fee" class="form-control rounded-pill" value="0">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-bold">Misc Fee</label>
            <input type="number" step="0.01" min="0" name="miscellaneous_fee" class="form-control rounded-pill" value="0">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-bold">Discount</label>
            <input type="number" step="0.01" min="0" name="discount" class="form-control rounded-pill" value="0">
        </div>
        <div class="col-md-4">
            <label class="form-label fw-bold">Fine</label>
            <input type="number" step="0.01" min="0" name="fine" class="form-control rounded-pill" value="0">
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="skip_existing" id="skip_existing" checked>
                <label class="form-check-label fw-bold" for="skip_existing">Skip existing same month/title invoices</label>
            </div>
        </div>
        <div class="col-12">
            <label class="form-label fw-bold">Note</label>
            <textarea name="note" class="form-control rounded-4" rows="3" placeholder="Optional note for all invoices"></textarea>
        </div>
        <div class="col-12 d-flex justify-content-end gap-2">
            <a href="{% url 'fees_collection' %}" class="btn btn-outline-dark rounded-pill">Cancel</a>
            <button type="submit" class="btn btn-success rounded-pill">Create Bulk Invoices</button>
        </div>
    </form>
</div>
{% endblock %}
