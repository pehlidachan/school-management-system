{% extends 'dashboard_base.html' %}
{% load static %}
{% block 'title' %}Add Calendar Event{% endblock %}
{% block 'content' %}
<div class="hub-toolbar">
    <div>
        <h1 class="hub-page-title">Add Calendar Event</h1>
        <p class="text-muted mb-0">Create school event, holiday, exam, meeting or deadline.</p>
    </div>
    <a href="{% url 'calendar_dashboard' %}" class="btn btn-outline-dark rounded-pill">Back</a>
</div>

<form method="POST" class="hub-card p-4">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-12">
            <label class="form-label">Title</label>
            <input name="title" class="form-control rounded-pill" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Event Type</label>
            <select name="event_type" class="form-select rounded-pill">
                {% for value, label in event_type_choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Audience</label>
            <select name="audience" class="form-select rounded-pill">
                {% for value, label in audience_choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Location</label>
            <input name="location" class="form-control rounded-pill" placeholder="School Hall / Class Room">
        </div>
        <div class="col-md-3">
            <label class="form-label">Event Date</label>
            <input type="date" name="event_date" value="{{ today|date:'Y-m-d' }}" class="form-control rounded-pill">
        </div>
        <div class="col-md-3">
            <label class="form-label">End Date</label>
            <input type="date" name="end_date" class="form-control rounded-pill">
        </div>
        <div class="col-md-3">
            <label class="form-label">Start Time</label>
            <input type="time" name="start_time" class="form-control rounded-pill">
        </div>
        <div class="col-md-3">
            <label class="form-label">End Time</label>
            <input type="time" name="end_time" class="form-control rounded-pill">
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <label class="form-check mb-2">
                <input class="form-check-input" type="checkbox" name="is_active" checked>
                <span class="form-check-label">Active / Show on calendar</span>
            </label>
        </div>
        <div class="col-12">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control rounded-4" rows="5"></textarea>
        </div>
        <div class="col-12 text-end">
            <button class="btn btn-success rounded-pill px-4" type="submit">Save Event</button>
        </div>
    </div>
</form>
{% endblock %}
