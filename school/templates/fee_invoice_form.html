{% extends 'dashboard_base.html' %}
{% load static %}
{% block 'title' %}Add Fee Invoice{% endblock %}
{% block 'content' %}
<div class="hub-toolbar">
    <div><h1 class="hub-page-title">Add Fee Invoice</h1><p class="text-muted mb-0">Create fee record for a student.</p></div>
    <a href="{% url 'fees_collection' %}" class="btn btn-outline-dark rounded-pill">Back</a>
</div>

<form method="POST" class="hub-card p-4">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Student</label>
            <select name="student" class="form-select rounded-pill" required>
                {% for student in students %}<option value="{{ student.id }}">{{ student.name }} - {{ student.grade }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-3"><label class="form-label">Title</label><input name="title" class="form-control rounded-pill" value="Monthly Fee"></div>
        <div class="col-md-3"><label class="form-label">Billing Month</label><input name="billing_month" class="form-control rounded-pill" placeholder="July 2026"></div>
        <div class="col-md-3"><label class="form-label">Due Date</label><input type="date" name="due_date" class="form-control rounded-pill" value="{{ today|date:'Y-m-d' }}"></div>
        <div class="col-md-3"><label class="form-label">Tuition Fee</label><input type="number" step="0.01" name="tuition_fee" class="form-control rounded-pill" value="0"></div>
        <div class="col-md-3"><label class="form-label">Activities Fee</label><input type="number" step="0.01" name="activities_fee" class="form-control rounded-pill" value="0"></div>
        <div class="col-md-3"><label class="form-label">Miscellaneous</label><input type="number" step="0.01" name="miscellaneous_fee" class="form-control rounded-pill" value="0"></div>
        <div class="col-md-3"><label class="form-label">Discount</label><input type="number" step="0.01" name="discount" class="form-control rounded-pill" value="0"></div>
        <div class="col-md-3"><label class="form-label">Fine</label><input type="number" step="0.01" name="fine" class="form-control rounded-pill" value="0"></div>
        <div class="col-md-3"><label class="form-label">Amount Paid</label><input type="number" step="0.01" name="amount_paid" class="form-control rounded-pill" value="0"></div>
        <div class="col-md-3"><label class="form-label">Payment Method</label><input name="payment_method" class="form-control rounded-pill" placeholder="Cash / Bank / Easypaisa"></div>
        <div class="col-12"><label class="form-label">Note</label><textarea name="note" class="form-control rounded-4" rows="3"></textarea></div>
        <div class="col-12 text-end"><button class="btn btn-success rounded-pill px-4" type="submit">Save Invoice</button></div>
    </div>
</form>
{% endblock %}
