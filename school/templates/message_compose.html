{% extends 'dashboard_base.html' %}
{% load static %}
{% block 'title' %}Compose Message{% endblock %}
{% block 'content' %}
<div class="hub-toolbar">
    <div>
        <h1 class="hub-page-title">Compose Message</h1>
        <p class="text-muted mb-0">Start a new internal conversation.</p>
    </div>
    <a href="{% url 'message_inbox' %}" class="btn btn-outline-dark rounded-pill">Back</a>
</div>

<form method="POST" class="hub-card p-4">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Recipient</label>
            <select name="recipient" class="form-select rounded-pill" required>
                {% for user_obj in users %}<option value="{{ user_obj.id }}">{{ user_obj.username }}{% if user_obj.get_full_name %} - {{ user_obj.get_full_name }}{% endif %}</option>{% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-select rounded-pill">
                {% for value, label in priority_choices %}<option value="{{ value }}">{{ label }}</option>{% endfor %}
            </select>
        </div>
        <div class="col-12"><label class="form-label">Subject</label><input name="subject" class="form-control rounded-pill" required></div>
        <div class="col-12"><label class="form-label">Body</label><textarea name="body" class="form-control rounded-4" rows="7" required></textarea></div>
        <div class="col-12 text-end"><button class="btn btn-success rounded-pill px-4" type="submit">Send</button></div>
    </div>
</form>
{% endblock %}
