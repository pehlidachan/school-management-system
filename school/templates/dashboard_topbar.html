<div class="hub-topbar">
    <div class="hub-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" placeholder="Search" aria-label="Search">
    </div>

    <div class="hub-userbar">
        <button class="hub-circle-btn" type="button" title="Messages"><i class="fa-solid fa-message"></i></button>
        <button class="hub-circle-btn" type="button" title="Notifications"><i class="fa-solid fa-bell"></i></button>
        <div class="text-end d-none d-sm-block">
            <div class="fw-bold">{{ request.user.get_full_name|default:request.user.username }}</div>
            <div class="small text-muted">
                {% if request.user.is_superuser %}Admin{% else %}School User{% endif %}
            </div>
        </div>
        <div class="hub-avatar">{{ request.user.username|slice:":1"|upper }}</div>
    </div>
</div>
