<!DOCTYPE html><html><head><title>School Slip</title><style>body{font-family:Arial;margin:30px}.card{border:2px solid #111;padding:25px;max-width:720px;margin:auto}.center{text-align:center}.box{border:1px solid #777;padding:10px;margin:8px 0}@media print{button{display:none}}</style></head><body><button onclick="window.print()">Print</button><div class="card"><div class="center"><h1>Government Middle School Shalgah</h1><h2>School Slip</h2><h3>{{ record.gate_pass_no }}</h3></div><div class="box"><b>Name</b><br>{{ record.display_name }}</div><div class="box"><b>Category</b><br>{{ record.person_type }}</div><div class="box"><b>Reason</b><br>{{ record.reason }}</div><div class="box"><b>Items</b><br>{{ record.luggage_detail|default:'-' }}</div><div class="box"><b>Date</b><br>{{ record.created_at }}</div><p style="margin-top:35px">Signature: ____________________</p></div></body></html>
