<aside class="hub-sidebar">
    <a class="hub-brand" href="{% url 'dashboard' %}">
        <span class="hub-logo"><i class="fa-solid fa-graduation-cap"></i></span>
        <span>SchoolHub</span>
    </a>

    <div>
        <div class="hub-menu-label">Menu</div>
        <nav class="hub-nav">
            <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"><span class="icon"><i class="fa-solid fa-house"></i></span>Dashboard</a>
            <a href="{% url 'display_staff' %}" class="{% if request.resolver_match.url_name == 'display_staff' %}active{% endif %}"><span class="icon"><i class="fa-solid fa-user-tie"></i></span>Teachers</a>

            <a href="{% url 'attendance_dashboard' %}" class="{% if 'attendance' in request.resolver_match.url_name %}active{% endif %}"><span class="icon"><i class="fa-solid fa-people-group"></i></span>Attendance</a>
            <a href="{% url 'finance_dashboard' %}" class="{% if 'finance' in request.resolver_match.url_name or 'fee' in request.resolver_match.url_name or 'expense' in request.resolver_match.url_name %}active{% endif %}"><span class="icon"><i class="fa-solid fa-circle-dollar-to-slot"></i></span>Finance</a>

        <nav class="hub-nav">
            <a href="/admin/"><span class="icon"><i class="fa-solid fa-screwdriver-wrench"></i></span>Django Admin</a>
            <a href="{% url 'home' %}"><span class="icon"><i class="fa-solid fa-globe"></i></span>Public Home</a>
            <a href="{% url 'logout' %}"><span class="icon"><i class="fa-solid fa-right-from-bracket"></i></span>Log out</a>
