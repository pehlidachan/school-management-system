{% extends 'dashboard_base.html' %}
{% block 'title' %}Add Vendor{% endblock %}
{% block 'content' %}
<div class="hub-toolbar"><div><h1 class="hub-page-title">Add Vendor</h1><p class="text-muted mb-0">Create a vendor/supplier profile.</p></div><a href="{% url 'ledger_dashboard' %}" class="btn btn-outline-dark rounded-pill">Back</a></div>
<div class="hub-card p-4"><form method="POST">{% csrf_token %}<div class="row g-3"><div class="col-md-6"><label class="form-label fw-bold">Name</label><input name="name" class="form-control" required></div><div class="col-md-6"><label class="form-label fw-bold">Phone</label><input name="phone" class="form-control"></div><div class="col-12"><label class="form-label fw-bold">Address</label><input name="address" class="form-control"></div><div class="col-12"><label class="form-label fw-bold">Note</label><textarea name="note" class="form-control" rows="3"></textarea></div><div class="col-12"><button class="btn btn-success rounded-pill px-4">Save Vendor</button></div></div></form></div>
{% endblock %}
