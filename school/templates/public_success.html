{% extends 'layout.html' %}
{% block 'title' %}Request Submitted{% endblock %}
{% block 'content' %}
<section class="page-section" style="padding-top: 120px; min-height: 60vh;">
    <div class="container">
        <div class="card border-0 shadow-lg rounded-4 mx-auto" style="max-width: 720px;">
            <div class="card-body p-5 text-center">
                <div class="display-5 mb-3 text-success"><i class="fa-solid fa-circle-check"></i></div>
                <h1 class="fw-bold mb-3">Request Submitted</h1>
                <p class="text-muted mb-4">Thank you. Your online request has been received by school administration.</p>
                <div class="d-flex gap-2 justify-content-center flex-wrap">
                    <a href="{% url 'home' %}" class="btn btn-dark rounded-pill px-4">Back to Home</a>
                    <a href="{% url 'online_admission_form' %}" class="btn btn-outline-dark rounded-pill px-4">Admission Form</a>
                    <a href="{% url 'parent_complaint_form' %}" class="btn btn-outline-dark rounded-pill px-4">Complaint Form</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
