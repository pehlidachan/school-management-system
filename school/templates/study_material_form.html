{% extends 'dashboard_base.html' %}
{% block 'title' %}Add Learning Resource{% endblock %}
{% block 'content' %}
<div class="hub-toolbar"><div><h1 class="hub-page-title">Add Learning Resource</h1><p class="text-muted mb-0">Add class/subject wise content or external link.</p></div><a href="{% url 'study_material_center' %}" class="btn btn-outline-dark rounded-pill">Back</a></div>
<div class="hub-card p-4"><form method="POST">{% csrf_token %}<div class="row g-3"><div class="col-md-6"><label class="form-label fw-bold">Title</label><input name="title" class="form-control" required></div><div class="col-md-3"><label class="form-label fw-bold">Class</label><select name="grade" class="form-select"><option value="">All</option>{% for grade in grades %}<option value="{{ grade.id }}">{{ grade.name }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label fw-bold">Subject</label><select name="subject" class="form-select"><option value="">All</option>{% for subject in subjects %}<option value="{{ subject.id }}">{{ subject.name }}</option>{% endfor %}</select></div><div class="col-12"><label class="form-label fw-bold">Description</label><textarea name="description" class="form-control" rows="2"></textarea></div><div class="col-12"><label class="form-label fw-bold">Content / Notes</label><textarea name="content" class="form-control" rows="8"></textarea></div><div class="col-12"><label class="form-label fw-bold">External URL</label><input name="external_url" class="form-control"></div><div class="col-12"><label class="form-check"><input type="checkbox" name="is_published" checked class="form-check-input"> Published</label></div><div class="col-12"><button class="btn btn-success rounded-pill px-4">Save Resource</button></div></div></form></div>
{% endblock %}
