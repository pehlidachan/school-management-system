{% extends 'dashboard_base.html' %}
{% block 'title' %}Non Teaching Staff Form{% endblock %}
{% block 'content' %}
<div class="hub-toolbar"><div><h1 class="hub-page-title">{% if record %}Edit{% else %}Add{% endif %} Non-Teaching Staff</h1><p class="text-muted mb-0">Appointment and work detail are extra fields.</p></div><a href="{% url 'non_teaching_staff_list' %}" class="btn btn-outline-dark rounded-pill">Back</a></div>
<div class="hub-card p-4"><form method="POST" class="row g-3">{% csrf_token %}<div class="col-md-4"><label class="form-label fw-bold">Name</label><input name="name" value="{{ record.name|default:'' }}" class="form-control rounded-pill" required></div><div class="col-md-4"><label class="form-label fw-bold">Appointment / Designation</label><input name="appointment" value="{{ record.appointment|default:'' }}" class="form-control rounded-pill" placeholder="Clerk, Peon, Guard, Lab Attendant" required></div><div class="col-md-4"><label class="form-label fw-bold">Department / Duty Place</label><input name="department" value="{{ record.department|default:'' }}" class="form-control rounded-pill"></div><div class="col-md-3"><label class="form-label fw-bold">Age</label><input type="number" name="age" value="{{ record.age|default:'' }}" class="form-control rounded-pill"></div><div class="col-md-3"><label class="form-label fw-bold">DOB</label><input type="date" name="dob" value="{{ record.dob|date:'Y-m-d' }}" class="form-control rounded-pill"></div><div class="col-md-3"><label class="form-label fw-bold">Gender</label><select name="gender" class="form-select rounded-pill"><option value="">Select</option>{% for item in genders %}<option value="{{ item.id }}" {% if record.gender_id == item.id %}selected{% endif %}>{{ item.name }}</option>{% endfor %}</select></div><div class="col-md-3"><label class="form-label fw-bold">Employment</label><select name="employment_status" class="form-select rounded-pill"><option value="">Select</option>{% for item in employment_statuses %}<option value="{{ item.id }}" {% if record.employment_status_id == item.id %}selected{% endif %}>{{ item.name }}</option>{% endfor %}</select></div><div class="col-md-4"><label class="form-label fw-bold">Phone</label><input name="phone" value="{{ record.phone|default:'' }}" class="form-control rounded-pill" required></div><div class="col-md-4"><label class="form-label fw-bold">Emergency Phone</label><input name="emergency_phone" value="{{ record.emergency_phone|default:'' }}" class="form-control rounded-pill"></div><div class="col-md-4"><label class="form-label fw-bold">Email</label><input type="email" name="email" value="{{ record.email|default:'' }}" class="form-control rounded-pill"></div><div class="col-md-4"><label class="form-label fw-bold">Qualification</label><input name="qualification" value="{{ record.qualification|default:'' }}" class="form-control rounded-pill"></div><div class="col-md-4"><label class="form-label fw-bold">Experience</label><input name="experience" value="{{ record.experience|default:'' }}" class="form-control rounded-pill"></div><div class="col-md-4"><label class="form-label fw-bold">Salary</label><input name="salary" value="{{ record.salary|default:'' }}" class="form-control rounded-pill"></div><div class="col-md-4"><label class="form-label fw-bold">Joining Date</label><input type="date" name="joining_date" value="{{ record.joining_date|date:'Y-m-d' }}" class="form-control rounded-pill"></div><div class="col-md-4 d-flex align-items-end"><label class="fw-bold"><input type="checkbox" name="status" {% if not record or record.status %}checked{% endif %}> Active</label></div><div class="col-md-12"><label class="form-label fw-bold">Work / Duty Detail</label><textarea name="work_detail" rows="4" class="form-control rounded-4">{{ record.work_detail|default:'' }}</textarea></div><div class="col-md-12"><label class="form-label fw-bold">Address</label><textarea name="address" rows="2" class="form-control rounded-4">{{ record.address|default:'' }}</textarea></div><div class="col-md-12"><label class="form-label fw-bold">Contract Details</label><textarea name="contract_details" rows="3" class="form-control rounded-4">{{ record.contract_details|default:'' }}</textarea></div><div class="col-12"><button class="btn btn-success rounded-pill px-4" type="submit">Save Record</button></div></form></div>
{% endblock %}
