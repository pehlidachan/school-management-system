{% extends 'dashboard_base.html' %}
{% load static %}
{% block 'title' %}Borrow Library Book{% endblock %}
{% block 'content' %}
<div class="hub-toolbar">
    <div>
        <h1 class="hub-page-title">Borrow Book</h1>
        <p class="text-muted mb-0">Assign an available library book to a student.</p>
    </div>
    <a href="{% url 'library_dashboard' %}" class="btn btn-outline-dark rounded-pill">Back</a>
</div>

<form method="POST" class="hub-card p-4">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Book</label>
            <select name="book" class="form-select rounded-pill" required>
                {% for book in books %}
                <option value="{{ book.id }}">{{ book.title }} - {{ book.accession_number }} - {{ book.available_copies }} available</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label">Student</label>
            <select name="student" class="form-select rounded-pill" required>
                {% for student in students %}
                <option value="{{ student.id }}">{{ student.name }} - {{ student.grade }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label">Start Date</label>
            <input type="date" name="issue_date" value="{{ today|date:'Y-m-d' }}" class="form-control rounded-pill">
        </div>
        <div class="col-md-4">
            <label class="form-label">Due Date</label>
            <input type="date" name="due_date" value="{{ today|date:'Y-m-d' }}" class="form-control rounded-pill">
        </div>
        <div class="col-md-4">
            <label class="form-label">Remarks</label>
            <input name="remarks" class="form-control rounded-pill">
        </div>
        <div class="col-12 text-end">
            <button class="btn btn-success rounded-pill px-4" type="submit">Save</button>
        </div>
    </div>
</form>
{% endblock %}
