{% extends 'dashboard_base.html' %}
{% load static %}
{% block 'title' %}Add Subject{% endblock %}
{% block 'content' %}
<div class="hub-toolbar">
    <div><h1 class="hub-page-title">Add Subject</h1><p class="text-muted mb-0">{{ exam.name }} - {{ exam.grade }}</p></div>
    <a href="{% url 'exam_detail' exam.id %}" class="btn btn-outline-dark rounded-pill">Back</a>
</div>
<form method="POST" class="hub-card p-4">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Subject</label><select name="subject" class="form-select rounded-pill" required>{% for subject in subjects %}<option value="{{ subject.id }}">{{ subject.name }}</option>{% endfor %}</select></div>
        <div class="col-md-3"><label class="form-label">Total Marks</label><input type="number" step="0.01" name="total_marks" class="form-control rounded-pill" value="100"></div>
        <div class="col-md-3"><label class="form-label">Passing Marks</label><input type="number" step="0.01" name="passing_marks" class="form-control rounded-pill" value="33"></div>
        <div class="col-12 text-end"><button class="btn btn-success rounded-pill px-4" type="submit">Save Subject</button></div>
    </div>
</form>
{% endblock %}
