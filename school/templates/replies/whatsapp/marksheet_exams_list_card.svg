<?xml version="1.0" encoding="UTF-8"?>
<svg id="whatsapp_marksheet_exams_list" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 522 715" width="522" height="715">
  <defs>
    <style>
      .wa-bg { fill:#f7f3eb; }
      .card { fill:#fff; filter:url(#shadow); }
      .body { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#111; }
      .small { font-size:11px; fill:#667085; }
      .bold { font-weight:700; }
      .heavy { font-weight:800; }
      .mono { font-family: "Courier New", Courier, monospace; }
      .tag { fill:#f4f4f4; stroke:#d9d9d9; stroke-width:0.7; }
      .time { font-size:10px; fill:#8a8f98; }
      .arrow-circle { fill:#fff; stroke:#ddd; stroke-width:1; filter:url(#softShadow); }
      .placeholder { fill:#f3f4f6; stroke:#e5e7eb; }
      .placeholder-text { font-family:Arial,Helvetica,sans-serif;font-size:34px;fill:#111; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <clipPath id="photoClip"><path d="M50 26h321a7 7 0 0 1 7 7v320a4 4 0 0 1-4 4H47a4 4 0 0 1-4-4V33a7 7 0 0 1 7-7z"/></clipPath>
  </defs>
  <rect class="wa-bg" x="0" y="0" width="522" height="715"/>
  <g opacity="0.16" stroke="#d7cfc2" stroke-width="1.2" fill="none">
    <circle cx="18" cy="42" r="10"/><path d="M55 28l14 9-12 8z"/><rect x="104" y="20" width="20" height="15" rx="3"/>
    <path d="M155 42c9-16 23-10 18 2s-24 16-18-2z"/><circle cx="220" cy="30" r="14"/>
    <path d="M285 52l22-18 18 22"/><rect x="365" y="26" width="30" height="24" rx="5"/>
    <path d="M445 46q18-26 35 0q-18 20-35 0z"/>
    <path d="M18 142l22 0m-11-11v22"/><circle cx="76" cy="135" r="17"/><path d="M130 120q15 25 30 0"/>
    <rect x="205" y="122" width="38" height="26" rx="6"/><path d="M286 127c10 3 18 13 15 25"/><circle cx="350" cy="140" r="20"/>
    <path d="M430 124l30 12-26 20z"/><circle cx="492" cy="140" r="12"/>
    <path d="M28 250q18-18 36 0t36 0"/><rect x="134" y="238" width="28" height="38" rx="5"/><circle cx="210" cy="254" r="18"/>
    <path d="M280 244h42v24h-42z"/><path d="M390 238l28 28m0-28l-28 28"/><circle cx="472" cy="258" r="22"/>
    <path d="M24 370c20-20 40 20 60 0"/><rect x="122" y="360" width="34" height="26" rx="7"/><circle cx="220" cy="374" r="14"/>
    <path d="M300 360l40 12-40 12z"/><path d="M420 362q20 28 40 0"/><rect x="480" y="362" width="30" height="30" rx="4"/>
    <circle cx="28" cy="490" r="18"/><path d="M95 480l28 20 28-20"/><rect x="205" y="476" width="36" height="36" rx="7"/>
    <path d="M310 478q24 0 24 24q-24 0-24-24z"/><circle cx="410" cy="496" r="20"/><path d="M480 482l22 22m0-22l-22 22"/>
    <path d="M30 620h50v30h-50z"/><circle cx="118" cy="634" r="20"/><path d="M205 620l28 15-28 15z"/><rect x="300" y="616" width="35" height="35" rx="8"/><circle cx="420" cy="635" r="18"/><path d="M480 618q26 18 0 36"/>
  </g>
  <rect class="card" x="43" y="26" width="335" height="671" rx="7"/>
  {% if student_photo_url %}
  <image id="student_photo" href="{{ student_photo_url }}" x="43" y="26" width="335" height="331" preserveAspectRatio="xMidYMid slice" clip-path="url(#photoClip)"/>
  {% else %}
  <rect class="placeholder" x="43" y="26" width="335" height="331" rx="7" clip-path="url(#photoClip)"/>
  <text class="placeholder-text" x="118" y="195">Student Picture</text>
  {% endif %}
  <path d="M387 350c10 0 18 8 18 18s-8 18-18 18c-5 0-10-2-13-5c5-6 5-22 0-28c3-2 8-3 13-3z" class="arrow-circle"/>
  <path d="M382 364h12m-5-5l6 5-6 5" fill="none" stroke="#7f8791" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <g id="request_icon">
    <rect x="53" y="365" width="16" height="16" rx="2" fill="#e8f2ff" stroke="#b8d7ff"/>
    <rect x="53" y="365" width="16" height="5" rx="2" fill="#3b82f6"/>
    <text x="56" y="379" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#344054">24</text>
  </g>
  <text class="body" x="76" y="381"><tspan>Request On : </tspan><tspan id="request_date" class="bold">{{ request_date_display }}</tspan></text>
  <path id="left_heart" d="M61 391c-6-8-17 1-8 10l8 8 8-8c9-9-2-18-8-10z" fill="#ff4fa3" stroke="#e54193" stroke-width=".5"/>
  <text class="body heavy" x="78" y="401" id="reply_title">{{ reply_title }}</text>
  <path id="right_heart" d="M243 391c-6-8-17 1-8 10l8 8 8-8c9-9-2-18-8-10z" fill="#ff4fa3" stroke="#e54193" stroke-width=".5"/>
  <line x1="53" y1="416" x2="341" y2="416" stroke="#111" stroke-dasharray="3 3" stroke-width="1"/>

  <text class="body" x="53" y="457"><tspan>Student : </tspan><tspan id="student_text" class="bold">{{ student_id_name }}</tspan></text>
  <text class="body" x="53" y="477"><tspan>Class : </tspan><tspan id="class_text" class="bold">{{ class_label }}</tspan></text>
  <text class="body" x="53" y="497"><tspan>Parent : </tspan><tspan id="parent_text" class="bold">{{ parent_name }}</tspan></text>

  <text class="body mono" x="53" y="532">====== </text>
  <rect class="tag" x="118" y="519" width="75" height="18" rx="2"/>
  <text class="small mono" x="124" y="532" id="section_label">{{ section_label }}</text>
  <text class="body mono" x="201" y="532"> ======</text>

  {% if exam_svg_rows %}
  {% for row in exam_svg_rows %}
  <text class="body" x="53" y="{{ row.y }}"><tspan>({{ row.exam.id }}) </tspan><tspan class="bold">{{ row.exam.name }}</tspan></text>
  {% endfor %}
  {% else %}
  <text class="body" x="53" y="572">No published exam found yet.</text>
  {% endif %}

  <line x1="53" y1="664" x2="341" y2="664" stroke="#111" stroke-dasharray="3 3" stroke-width="1"/>
  <text class="body heavy" x="53" y="686" id="school_footer">{{ short_school_name }}</text>
  <text class="time" x="327" y="692" id="reply_time">{{ reply_time_display }}</text>
</svg>